name: Docker Build and Deploy to EC2

on:
  push:
    branches:
      - main  # Change this to the branch you want to trigger the workflow on

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest  # GitHub Actions runner environment (Ubuntu-based)

    steps:
    # Step 1: Checkout code from GitHub
    - name: Checkout repository code
      uses: actions/checkout@v2

    # Step 2: Set up Docker Buildx (for multi-platform builds, if necessary)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    # Step 3: Log in to Docker Hub (using Docker credentials stored in GitHub Secrets)
    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # Store your Docker Hub username in GitHub Secrets
        password: ${{ secrets.DOCKER_PASSWORD }}  # Store your Docker Hub password or PAT in GitHub Secrets

    # Step 4: Build the Docker image using the Dockerfile
    - name: Build Docker image
      run: |
        docker build -t vishal09be/m_mpharmacy:latest .

    # Step 5: Push the Docker image to Docker Hub
    - name: Push Docker image to Docker Hub
      run: |
        docker push vishal09be/m_mpharmacy:latest

    # Step 6: Deploy to EC2 instance
    - name: Deploy to EC2 instance
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_IP }}  # The public IP address of your EC2 instance
        username: ${{ secrets.EC2_USER }}  # The EC2 username (typically 'ec2-user' for Amazon Linux)
        key: ${{ secrets.EC2_PRIVATE_KEY }}  # The private key to SSH into your EC2 instance
        script: |
          # Check if port 5000 is in use, and if so, stop and remove the existing container
          echo "Checking if port 5000 is in use..."
          if [ $(lsof -i :5000) ]; then
            echo "Port 5000 is in use. Stopping and removing the existing container..."
            # Forcefully stop and remove the container using port 5000
            docker ps -q -f "name=flask-app" | xargs -I {} docker stop {} && docker rm {}
          fi

          # Run the new container on port 5000 (or fallback to port 5001 if 5000 is still in use)
          echo "Running the new Flask application..."
          if [ $(lsof -i :5000) ]; then
            echo "Port 5000 is still in use. Running the container on port 5001..."
            docker run -d --name flask-app -p 5001:5000 vishal09be/m_mpharmacy:latest
          else
            echo "Port 5000 is free. Running the container on port 5000..."
            docker run -d --name flask-app -p 5000:5000 vishal09be/m_mpharmacy:latest
          fi
