name: Docker Build and Deploy to EC2

on:
  push:
    branches:
      - main  # The branch to trigger the build and deploy workflow. Change if you are using another branch.

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest  # GitHub runner environment (Ubuntu-based)

    steps:
    # Step 1: Checkout code from GitHub
    - name: Checkout repository code
      uses: actions/checkout@v2

    # Step 2: Set up Docker Buildx (for multi-platform builds)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    # Step 3: Log in to Docker Hub (replace with your Docker Hub credentials)
    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}  # Store your Docker Hub username in GitHub Secrets
        password: ${{ secrets.DOCKER_PASSWORD }}  # Store your Docker Hub password or Personal Access Token (PAT) in GitHub Secrets

    # Step 4: Build Docker image using Dockerfile
    - name: Build Docker image
      run: |
        docker build -t vishal09be/m_mpharmacy:latest .

    # Step 5: Push Docker image to Docker Hub
    - name: Push Docker image to Docker Hub
      run: |
        docker push vishal09be/m_mpharmacy:latest

    # Step 6: Deploy to EC2 instance
    - name: Deploy to EC2 instance
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.EC2_IP }}  # The public IP address of your EC2 instance (stored in GitHub Secrets)
        username: ${{ secrets.EC2_USER }}  # EC2 username (typically 'ec2-user' for Amazon Linux)
        key: ${{ secrets.EC2_PRIVATE_KEY }}  # EC2 private key (stored as a GitHub Secret)
        script: |
          # Check if the container exists and remove the old one
          if [ $(docker ps -aq -f name=flask-app) ]; then
            docker stop flask-app
            docker rm flask-app
          fi

          # Run the new container on port 5000 (or port 5001 if you prefer)
          docker run -d --name flask-app -p 5001:5000 vishal09be/m_mpharmacy:latest
