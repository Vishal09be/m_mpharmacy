version: 0.2
phases:
    install:
         commands:
            - pip install pylint
        runtime-versions:
            python: 3.12
        commands:
            - pip install --upgrade pip
            - pip install -r requirements.txt pylint
    pre_build:
        commands:
            - python --version
            - pylint $CODEBUILD_SRC_DIR/*.py
#            - pylint $CODEBUILD_SRC_DIR/myapp/*.py
artifacts:
    files:
        - '**/*'
