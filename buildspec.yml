version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install pylint
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - python --version
      - pylint $CODEBUILD_SRC_DIR/*.py
      # - pylint $CODEBUILD_SRC_DIR/myapp/*.py

artifacts:
  files:
    - '**/*'
